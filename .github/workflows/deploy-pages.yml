name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Compute Pages base path
        env:
          PAGES_BASE_PATH_OVERRIDE: ${{ vars.PAGES_BASE_PATH_OVERRIDE }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_name="${GITHUB_REPOSITORY_OWNER}"

          if [ -n "${PAGES_BASE_PATH_OVERRIDE}" ]; then
            case "${PAGES_BASE_PATH_OVERRIDE}" in
              /|root|ROOT)
                base_path=""
                ;;
              *)
                base_path="${PAGES_BASE_PATH_OVERRIDE}"
                ;;
            esac
          elif [ "${repo_name}" = "${owner_name}.github.io" ]; then
            base_path=""
          else
            base_path="/${repo_name}"
          fi

          echo "PAGES_BASE_PATH=${base_path}" >> "${GITHUB_ENV}"
          echo "Using PAGES_BASE_PATH='${base_path}'"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build --workspace=apps/web

      - name: Add .nojekyll marker
        run: touch apps/web/out/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
